<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 220" width="700" height="220">
  <defs>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#062F34"/>
      <stop offset="50%"  stop-color="#0D5C63"/>
      <stop offset="100%" stop-color="#0A4A50"/>
    </linearGradient>

    <radialGradient id="iconGrad" cx="38%" cy="32%" r="70%">
      <stop offset="0%"   stop-color="#1B8C96"/>
      <stop offset="60%"  stop-color="#0D5C63"/>
      <stop offset="100%" stop-color="#041E21"/>
    </radialGradient>

    <radialGradient id="amberGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#FFD580"/>
      <stop offset="100%" stop-color="#F4A226"/>
    </radialGradient>

    <clipPath id="pillClip">
      <rect x="0" y="0" width="700" height="220" rx="26" ry="26"/>
    </clipPath>

    <clipPath id="drumClip">
      <circle cx="118" cy="110" r="58"/>
    </clipPath>

  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="700" height="220" rx="26" ry="26" fill="url(#bgGrad)"/>

  <!-- Top amber accent bar -->
  <rect x="26" y="0" width="648" height="3" rx="1" ry="1" fill="#F4A226" opacity="0.45"/>

  <!-- Subtle dot grid in text area -->
  <g clip-path="url(#pillClip)" opacity="0.055" fill="white">
    <circle cx="250" cy="55"  r="1.8"/><circle cx="300" cy="55"  r="1.8"/>
    <circle cx="350" cy="55"  r="1.8"/><circle cx="400" cy="55"  r="1.8"/>
    <circle cx="450" cy="55"  r="1.8"/><circle cx="500" cy="55"  r="1.8"/>
    <circle cx="550" cy="55"  r="1.8"/><circle cx="600" cy="55"  r="1.8"/>
    <circle cx="650" cy="55"  r="1.8"/>
    <circle cx="275" cy="90"  r="1.8"/><circle cx="325" cy="90"  r="1.8"/>
    <circle cx="375" cy="90"  r="1.8"/><circle cx="425" cy="90"  r="1.8"/>
    <circle cx="475" cy="90"  r="1.8"/><circle cx="525" cy="90"  r="1.8"/>
    <circle cx="575" cy="90"  r="1.8"/><circle cx="625" cy="90"  r="1.8"/>
    <circle cx="675" cy="90"  r="1.8"/>
    <circle cx="250" cy="165" r="1.8"/><circle cx="300" cy="165" r="1.8"/>
    <circle cx="350" cy="165" r="1.8"/><circle cx="400" cy="165" r="1.8"/>
    <circle cx="450" cy="165" r="1.8"/><circle cx="500" cy="165" r="1.8"/>
    <circle cx="550" cy="165" r="1.8"/><circle cx="600" cy="165" r="1.8"/>
    <circle cx="650" cy="165" r="1.8"/>
  </g>

  <!-- ══ ICON BADGE ══ -->

  <!-- Outer glow halo -->
  <circle cx="118" cy="110" r="85" fill="#F4A226" opacity="0.07"/>

  <!-- Amber border ring -->
  <circle cx="118" cy="110" r="82" fill="none" stroke="#F4A226" stroke-width="2.5"/>

  <!-- Icon background circle -->
  <circle cx="118" cy="110" r="76" fill="url(#iconGrad)"/>

  <!-- Top-left gloss -->
  <ellipse cx="95" cy="78" rx="36" ry="22"
           fill="white" fill-opacity="0.08"
           transform="rotate(-30 95 78)"
           clip-path="url(#pillClip)"/>

  <!-- Spin segment 1 (bright) -->
  <path d="M118,52 A58,58,0,0,1,168,126 L155,119 A43,43,0,0,0,118,67 Z"
        fill="white" fill-opacity="0.11" clip-path="url(#drumClip)"/>

  <!-- Spin segment 2 -->
  <path d="M168,126 A58,58,0,0,1,68,126 L81,119 A43,43,0,0,0,155,119 Z"
        fill="white" fill-opacity="0.05" clip-path="url(#drumClip)"/>

  <!-- Main drum ring -->
  <circle cx="118" cy="110" r="59" fill="white" fill-opacity="0.04"
          stroke="white" stroke-width="4" stroke-opacity="0.92"/>

  <!-- Inner drum detail ring -->
  <circle cx="118" cy="110" r="43" fill="none"
          stroke="white" stroke-width="1.3" stroke-opacity="0.22"/>

  <!-- Five drum bolt holes -->
  <circle cx="118" cy="52"  r="3.2" fill="white" fill-opacity="0.42"/>
  <circle cx="164" cy="79"  r="3.2" fill="white" fill-opacity="0.36"/>
  <circle cx="148" cy="140" r="3.2" fill="white" fill-opacity="0.30"/>
  <circle cx="88"  cy="140" r="3.2" fill="white" fill-opacity="0.30"/>
  <circle cx="72"  cy="79"  r="3.2" fill="white" fill-opacity="0.36"/>

  <!-- Water wave — bright white -->
  <path d="M 86 112 Q 102 90 118 112 Q 134 134 150 112"
        fill="none" stroke="white" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.95"/>

  <!-- Amber power button -->
  <circle cx="150" cy="72" r="13" fill="url(#amberGrad)"/>
  <line  x1="150" y1="66" x2="150" y2="72"
         stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <path  d="M 145.5 68 A 6.5 6.5 0 1 0 154.5 68"
         fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <circle cx="146" cy="68" r="3.5" fill="white" fill-opacity="0.38"/>

  <!-- Amber bubble cluster -->
  <circle cx="174" cy="55" r="12"  fill="url(#amberGrad)"/>
  <circle cx="188" cy="71" r="7.5" fill="#F4A226" opacity="0.76"/>
  <circle cx="165" cy="43" r="5.5" fill="#F4A226" opacity="0.60"/>
  <circle cx="183" cy="46" r="3.5" fill="#FFD580" opacity="0.50"/>
  <!-- Shine dot on big bubble -->
  <circle cx="169" cy="51" r="4"   fill="white" fill-opacity="0.40"/>

  <!-- Small white bubbles (bottom-left) -->
  <circle cx="52"  cy="144" r="5"   fill="white" fill-opacity="0.16"/>
  <circle cx="42"  cy="130" r="3.2" fill="white" fill-opacity="0.10"/>
  <circle cx="56"  cy="158" r="2.2" fill="white" fill-opacity="0.07"/>

  <!-- Bottom depth shadow inside icon -->
  <ellipse cx="118" cy="182" rx="62" ry="14"
           fill="black" fill-opacity="0.16" clip-path="url(#pillClip)"/>

  <!-- ══ VERTICAL DIVIDER ══ -->
  <line x1="226" y1="38" x2="226" y2="182"
        stroke="white" stroke-opacity="0.13" stroke-width="1"/>
  <circle cx="226" cy="36"  r="3" fill="#F4A226" opacity="0.55"/>
  <circle cx="226" cy="184" r="3" fill="#F4A226" opacity="0.30"/>

  <!-- ══ WORDMARK ══ -->

  <!-- "Fresh" in white -->
  <text x="252" y="132"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72"
        font-weight="bold"
        fill="#FFFFFF"
        letter-spacing="-1">Fresh</text>

  <!-- "Fold" in amber — starts after "Fresh" (~252 + 215 = 467) -->
  <text x="467" y="132"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="72"
        font-weight="bold"
        fill="#F4A226"
        letter-spacing="-1">Fold</text>

  <!-- Amber separator rule -->
  <rect x="252" y="148" width="398" height="2" rx="1" ry="1"
        fill="#F4A226" opacity="0.40"/>

  <!-- "LAUNDRY CO." tagline -->
  <text x="254" y="184"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14"
        font-weight="bold"
        fill="white"
        fill-opacity="0.62"
        letter-spacing="7">LAUNDRY CO.</text>

  <!-- Trailing amber dots -->
  <circle cx="644" cy="179" r="5"   fill="#F4A226" opacity="0.65"/>
  <circle cx="657" cy="179" r="3.5" fill="#F4A226" opacity="0.38"/>
  <circle cx="667" cy="179" r="2"   fill="#F4A226" opacity="0.20"/>

</svg>
