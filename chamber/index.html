<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaduna Chamber of Commerce | Home page</title>
    <link rel="icon" href="kaduna-chamber.ico">
    <meta name="description" content="Discover local businesses, events, and opportunities with the Kaduna Chamber of Commerce.">
    <meta name="author" content="Osaruyi Kingsley Osawaru">
    <link rel="icon"  href="images/kaduna-chamber.ico">
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Kaduna Chamber of Commerce">

    <meta property="og:description" content="Discover local businesses, events, and opportunities with the Kaduna Chamber of Commerce.">
    <meta property="og:image" content="https://kingsley-byu.github.io/wdd231/chamber/images/kaduna-chamber-logo.svg">
    <meta property="og:url" content="https://kingsley-byu.github.io/wdd231/chamber/directory.html">
    <meta property="og:type" content="website">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
     
    <link rel="stylesheet" href="../styles/normalize.css">
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/large.css">
    <script  src="scripts/home.mjs" type="module"></script>
</head>
<body>
    <header>
        <img src="images/kaduna-chamber-logo.svg" alt="Chamber of Commerce logo">
        <span id="title-bar">Kaduna Chamber of Commerce</span>
        <button id="menu-btn" aria-label="Toggle navigation">☰</button>
        
        <nav id="nav-bar">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="discover.html">Discover</a></li>
                <li><a href="directory.html">Business Directory</a></li>
                <li><a href="join.html">Join</a></li>
            </ul>
        </nav>
        
    </header>
    <main>
        <section class="hero">

            <picture>
                <source srcset="images/kaduna-image-large.webp" media="(min-width: 1000px)">
                <source srcset="images/kaduna-image-medium.webp" media="(min-width: 640px)">

                <img src="images/kaduna-image-small.webp" alt="Kaduna city business district" loading="lazy" width="1200" height="500">
            </picture>

            <div class="hero-overlay">
                <h1>Welcome to Kaduna Chamber of Commerce</h1>

                <p>Connecting businesses, supporting growth, and creating opportunities in Kaduna State.</p>

                <a href="join.html" class="cta-btn">Join Now</a>
            </div>

        </section>

        <section id="event" class="info-card"></section>

        <section id="current-weather" class="info-card"></section>
        <section id="forecast" class="info-card"></section>
        <section class="spotlight-section">

            <h2 class="spotlight-heading">Business Spotlights</h2>

            <div id="business-info">


            </div>

        </section>
        
    </main>
    <footer>
        
        <div class="footer-info">
            <p>&copy; <span id="currentyear"></span> &bull; Osaruyi Kingsley Osawaru &bull; Nigeria</p>
        </div>

        <div class="footer-modified">
            <p id="lastModified"></p>
        </div>

    </footer>
    
</body>
</html>
