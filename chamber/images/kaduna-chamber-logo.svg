<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600">
  <defs>
    <style>
      .navy  { fill: #0B2D5C; }
      .green { fill: #1a5c2a; }
      .gold  { fill: #C9A84C; }
      .white { fill: #ffffff; }
      .title {
        font-family: Georgia, 'Times New Roman', serif;
        font-weight: 900;
      }
      .subtitle {
        font-family: Arial, sans-serif;
        font-weight: 700;
        letter-spacing: 3px;
      }
      .tagline {
        font-family: Georgia, serif;
        font-style: italic;
        letter-spacing: 2px;
      }
    </style>
  </defs>

  <!-- ── OUTER CIRCLE ── -->
  <circle cx="250" cy="210" r="195" fill="white" stroke="#0B2D5C" stroke-width="5"/>

  <!-- ── GOLD ARC (inner ring top) ── -->
  <path d="M 80 180 A 175 175 0 0 1 420 180"
        fill="none" stroke="#C9A84C" stroke-width="4"/>

  <!-- ── CURVED TEXT: KADUNA CHAMBER OF COMMERCE (top arc) ── -->
  <path id="topArc" d="M 75 195 A 178 178 0 0 1 425 195" fill="none"/>
  <text font-size="18" class="subtitle" fill="#0B2D5C">
    <textPath href="#topArc" startOffset="5%">
      • KADUNA CHAMBER OF COMMERCE •
    </textPath>
  </text>

  <!-- ══════════════════════════════
       SKYLINE BUILDINGS
  ══════════════════════════════ -->

  <!-- Factory left -->
  <g fill="#0B2D5C">
    <rect x="62" y="175" width="40" height="80"/>
    <rect x="65" y="155" width="8" height="25"/>
    <rect x="78" y="160" width="8" height="20"/>
    <rect x="91" y="158" width="8" height="22"/>
    <rect x="68" y="180" width="8" height="10" fill="white" opacity="0.6"/>
    <rect x="82" y="180" width="8" height="10" fill="white" opacity="0.6"/>
    <rect x="68" y="198" width="8" height="10" fill="white" opacity="0.6"/>
    <rect x="82" y="198" width="8" height="10" fill="white" opacity="0.6"/>
    <rect x="68" y="216" width="8" height="10" fill="white" opacity="0.6"/>
    <rect x="82" y="216" width="8" height="10" fill="white" opacity="0.6"/>
    <!-- small building beside -->
    <rect x="104" y="195" width="25" height="60"/>
    <rect x="108" y="202" width="6" height="8" fill="white" opacity="0.6"/>
    <rect x="118" y="202" width="6" height="8" fill="white" opacity="0.6"/>
    <rect x="108" y="218" width="6" height="8" fill="white" opacity="0.6"/>
    <rect x="118" y="218" width="6" height="8" fill="white" opacity="0.6"/>
  </g>

  <!-- Office towers right -->
  <g fill="#0B2D5C">
    <!-- Tall tower -->
    <rect x="360" y="155" width="38" height="100"/>
    <rect x="364" y="162" width="8" height="10" fill="white" opacity="0.6"/>
    <rect x="377" y="162" width="8" height="10" fill="white" opacity="0.6"/>
    <rect x="364" y="178" width="8" height="10" fill="white" opacity="0.6"/>
    <rect x="377" y="178" width="8" height="10" fill="white" opacity="0.6"/>
    <rect x="364" y="194" width="8" height="10" fill="white" opacity="0.6"/>
    <rect x="377" y="194" width="8" height="10" fill="white" opacity="0.6"/>
    <rect x="364" y="210" width="8" height="10" fill="white" opacity="0.6"/>
    <rect x="377" y="210" width="8" height="10" fill="white" opacity="0.6"/>
    <!-- Shorter tower beside -->
    <rect x="332" y="178" width="28" height="77"/>
    <rect x="336" y="184" width="7" height="9" fill="white" opacity="0.6"/>
    <rect x="348" y="184" width="7" height="9" fill="white" opacity="0.6"/>
    <rect x="336" y="200" width="7" height="9" fill="white" opacity="0.6"/>
    <rect x="348" y="200" width="7" height="9" fill="white" opacity="0.6"/>
    <rect x="336" y="216" width="7" height="9" fill="white" opacity="0.6"/>
    <rect x="348" y="216" width="7" height="9" fill="white" opacity="0.6"/>
  </g>

  <!-- ══════════════════════════════
       CENTRAL MOSQUE / DOME BUILDING
  ══════════════════════════════ -->
  <g fill="#1a5c2a">
    <!-- Main dome -->
    <ellipse cx="250" cy="148" rx="42" ry="38"/>
    <!-- Dome top finial -->
    <rect x="247" y="108" width="6" height="16"/>
    <circle cx="250" cy="106" r="5"/>

    <!-- Left minaret -->
    <rect x="188" y="148" width="18" height="90"/>
    <ellipse cx="197" cy="148" rx="9" ry="14"/>
    <rect x="193" y="134" width="8" height="16"/>
    <circle cx="197" cy="132" r="4"/>

    <!-- Right minaret -->
    <rect x="294" y="148" width="18" height="90"/>
    <ellipse cx="303" cy="148" rx="9" ry="14"/>
    <rect x="299" y="134" width="8" height="16"/>
    <circle cx="303" cy="132" r="4"/>

    <!-- Small side minarets -->
    <rect x="210" y="168" width="12" height="70"/>
    <ellipse cx="216" cy="168" rx="6" ry="10"/>
    <rect x="278" y="168" width="12" height="70"/>
    <ellipse cx="284" cy="168" rx="6" ry="10"/>

    <!-- Main building body -->
    <rect x="196" y="190" width="108" height="65"/>

    <!-- Arched windows on mosque -->
    <path d="M214 225 Q214 210 222 210 Q230 210 230 225 L230 238 L214 238 Z" fill="#0B2D5C" opacity="0.4"/>
    <path d="M241 225 Q241 210 250 210 Q259 210 259 225 L259 238 L241 238 Z" fill="#0B2D5C" opacity="0.4"/>
    <path d="M270 225 Q270 210 278 210 Q286 210 286 225 L286 238 L270 238 Z" fill="#0B2D5C" opacity="0.4"/>

    <!-- Central arch door -->
    <path d="M235 256 Q235 238 250 238 Q265 238 265 256 L265 255 L235 255 Z" fill="#0B2D5C" opacity="0.5"/>
  </g>

  <!-- ── GREEN GROUND SWOOSH ── -->
  <path d="M 58 268 Q 250 340 442 268 L 442 285 Q 250 360 58 285 Z"
        fill="#1a5c2a"/>

  <!-- ── LEAF LEFT ── -->
  <path d="M 120 295 Q 80 340 100 390 Q 140 360 160 310 Z"
        fill="#1a5c2a"/>
  <!-- ── LEAF RIGHT ── -->
  <path d="M 380 295 Q 420 340 400 390 Q 360 360 340 310 Z"
        fill="#1a5c2a"/>

  <!-- ── HANDSHAKE ── -->
  <g transform="translate(250,320)">
    <!-- Left hand/arm -->
    <path d="M-110 30 L-60 0 Q-40-10-20 0 L10 20"
          fill="none" stroke="#0B2D5C" stroke-width="28"
          stroke-linecap="round"/>
    <!-- Right hand/arm -->
    <path d="M110 30 L60 0 Q40-10 20 0 L-10 20"
          fill="none" stroke="#0B2D5C" stroke-width="28"
          stroke-linecap="round"/>
    <!-- Clasped hands center -->
    <ellipse cx="0" cy="18" rx="28" ry="20" fill="#0B2D5C"/>
    <!-- Finger lines -->
    <line x1="-18" y1="8" x2="18" y2="8" stroke="white" stroke-width="2.5" opacity="0.5"/>
    <line x1="-20" y1="18" x2="20" y2="18" stroke="white" stroke-width="2.5" opacity="0.5"/>
    <line x1="-18" y1="28" x2="18" y2="28" stroke="white" stroke-width="2.5" opacity="0.5"/>
  </g>

  <!-- ── BOTTOM CIRCLE BORDER ── -->
  <circle cx="250" cy="210" r="195" fill="none" stroke="#1a5c2a" stroke-width="3" stroke-dasharray="8,4"/>

  <!-- ══════════════════════════════
       TEXT BELOW CIRCLE
  ══════════════════════════════ -->

  <!-- KADUNA large text -->
  <text x="250" y="460"
        text-anchor="middle"
        font-size="78"
        class="title navy"
        fill="#0B2D5C">KADUNA</text>

  <!-- Gold diamond divider -->
  <text x="250" y="488" text-anchor="middle" font-size="14" fill="#C9A84C">◆──────────────◆</text>

  <!-- CHAMBER OF COMMERCE -->
  <text x="250" y="515"
        text-anchor="middle"
        font-size="22"
        class="subtitle"
        fill="#1a5c2a">CHAMBER OF COMMERCE</text>

  <!-- Gold line -->
  <line x1="120" y1="530" x2="380" y2="530" stroke="#C9A84C" stroke-width="2"/>

  <!-- Tagline -->
  <text x="250" y="558"
        text-anchor="middle"
        font-size="18"
        class="tagline"
        fill="#0B2D5C">CONNECT • EMPOWER • GROW</text>

</svg>
